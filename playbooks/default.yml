---
- name: Setup everything
  hosts: all
  become: true
  vars:
    # System
    woomy_domain: woomy.be
    colle_domain: colle.dev
    woomy_user: woomy
    system_users:
      - woomy
      - polyrhachis

    docker_user: docker
    services_dirname: services

    # NextCloud
    nextcloud_domain: nextcloud.{{ woomy_domain }}
    nextcloud_trusted_domains: www.{{ nextcloud_domain }} nextcloud.{{ colle_domain }}
    nextcloud_mail_from: nextcloud

    # Vaultwarden
    vaultwarden_proto: https
    vaultwarden_main_domain: bitwarden.{{ woomy_domain }}
    vaultwarden_all_domains: www.bitwarden.{{ woomy_domain }}
    vaultwarden_smtp_from: vaultwarden@{{ woomy_domain }}

    # Grafana
    grafana_domain: metrics.woomy.be
    grafana_proto: https
    grafana_user_name: owner
  roles:
    - role: timezone
      tags: sysconfig
    - role: hostname
      tags: sysconfig
    - role: dnf
      tags:
        - sysconfig
        - packages
    - role: users
      tags:
        - sysconfig
        - users
        - static
    - role: journal
      tags: sysconfig
    - role: firewall
      tags: sysconfig
    - role: fail2ban
      tags: sysconfig
    - role: sshd_config
      tags: sysconfig
    - role: caddy
      tags: web
    - role: docker
      tags:
        - docker
        - web
        - borg
        - vaultwarden
        - nextcloud
        - fiibot_id
        - fiibot_interservers
        - fiibot_logger
        - fiibot_moderation
        - prometheus
        - grafana
        - alloy
    - role: vaultwarden
      tags: vaultwarden
    - role: static
      tags: static
    - role: nextcloud
      tags: nextcloud
    - role: fiibot_id
      tags: fiibot_id
    - role: fiibot_interservers
      tags: fiibot_interservers
    - role: fiibot_logger
      tags: fiibot_logger
    - role: fiibot_moderation
      tags: fiibot_moderation
    - role: borg
      tags: borg
    - role: loki
      tags: loki
    - role: alloy
      tags: alloy
    - role: prometheus
      tags: prometheus
    - role: grafana
      tags: grafana
