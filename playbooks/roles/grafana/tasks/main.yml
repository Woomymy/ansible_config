---
- name: Set grafana service's home path
  ansible.builtin.set_fact:
    grafana_dir: "{{ services_homedir }}/grafana"

- name: Create the grafana services's dir
  become: true
  become_user: "{{ docker_user }}"
  ansible.builtin.file:
    path: "{{ grafana_dir }}"
    state: directory
    mode: "0755"

- name: Copy docker-compose.yml to the grafana's service directory
  become: true
  become_user: "{{ docker_user }}"
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: "{{ grafana_dir }}/docker-compose.yml"
    mode: "0755"

- name: Copy prometheus data source
  become: true
  become_user: "{{ docker_user }}"
  ansible.builtin.copy:
    src: datasources.yml
    dest: "{{ grafana_dir }}/datasources.yml"
    mode: "0755"
  notify: Restart grafana

- name: Copy env file
  become: true
  become_user: "{{ docker_user }}"
  ansible.builtin.template:
    src: env.j2
    dest: "{{ grafana_dir }}/.env"
    mode: "0755"
  notify: Restart grafana

- name: Copy conf file
  become: true
  become_user: "{{ docker_user }}"
  ansible.builtin.template:
    src: conf.ini
    dest: "{{ grafana_dir }}/conf.ini"
    mode: "0755"
  notify: Restart grafana

- name: Copy caddy site configuration
  ansible.builtin.template:
    src: grafana.caddyfile
    dest: /etc/caddy/sites/grafana.caddyfile
    mode: "0755"
  notify:
    - Restart caddy.service

- name: Start grafana
  become: true
  become_user: "{{ docker_user }}"
  environment:
    XDG_RUNTIME_DIR: /run/user/{{ docker_user_info.uid }}
    PATH: "{{ docker_user_info.home }}/bin:{{ ansible_facts['env']['PATH'] }}"
    DOCKER_HOST: unix:///run/user/{{ docker_user_info.uid }}/docker.sock
  community.docker.docker_compose_v2:
    project_src: "{{ grafana_dir }}"
    state: present
    remove_orphans: true
