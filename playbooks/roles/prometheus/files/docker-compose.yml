---
services:
  prometheus:
    image: prom/prometheus:v3.12.0-distroless
    command:
      - --web.enable-remote-write-receiver
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - data:/prometheus
    restart: always
    ports:
      - 127.0.0.1:9090:9090
    extra_hosts:
      - host.docker.internal:10.0.2.2

volumes:
  data:
    driver: local
